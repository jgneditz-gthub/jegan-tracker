name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4.2.2

    - name: Set up Python 3.10
      uses: actions/setup-python@v5.4.0
      with:
        python-version: "3.10"

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip \
          openjdk-17-jdk \
          libffi-dev libssl-dev \
          build-essential \
          libsqlite3-dev \
          zlib1g-dev \
          libncurses5 \
          autoconf automake libtool \
          pkg-config cmake

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install cython==0.29.36
        pip install buildozer

    - name: Cache buildozer global directory
      uses: actions/cache@v4.2.3
      with:
        path: ~/.buildozer
        key: buildozer-${{ runner.os }}-v2
        restore-keys: buildozer-${{ runner.os }}-

    - name: Cache Android SDK/NDK
      uses: actions/cache@v4.2.3
      with:
        path: ~/.android
        key: android-sdk-${{ runner.os }}-v2
        restore-keys: android-sdk-${{ runner.os }}-

    - name: Write main.py
      run: |
        cat > main.py << 'PYEOF'
        from kivy.app import App
        from kivy.uix.boxlayout import BoxLayout
        from kivy.uix.label import Label
        from kivy.uix.textinput import TextInput
        from kivy.uix.button import Button
        from kivy.uix.spinner import Spinner
        import datetime

        class ExpenseApp(App):
            def build(self):
                self.expenses = []
                self.current_day = datetime.date.today()
                layout = BoxLayout(orientation='vertical', padding=10, spacing=10)
                self.amount_input = TextInput(hint_text="Enter amount", multiline=False, input_filter='float')
                layout.add_widget(self.amount_input)
                self.category = Spinner(text="Food", values=("Food", "Travel", "Shopping", "Other"))
                layout.add_widget(self.category)
                btn = Button(text="Add Expense")
                btn.bind(on_press=self.add_expense)
                layout.add_widget(btn)
                self.total_label = Label(text="Total: 0")
                layout.add_widget(self.total_label)
                self.dashboard = Label(text="No data yet")
                layout.add_widget(self.dashboard)
                return layout

            def add_expense(self, instance):
                today = datetime.date.today()
                if today != self.current_day:
                    self.expenses = []
                    self.current_day = today
                try:
                    amt = float(self.amount_input.text)
                    if amt <= 0:
                        self.total_label.text = "Amount must be positive"
                        return
                    cat = self.category.text
                    self.expenses.append((amt, cat))
                    self.amount_input.text = ""
                    self.update_ui()
                except ValueError:
                    self.total_label.text = "Invalid input"

            def update_ui(self):
                total = sum(x[0] for x in self.expenses)
                cat_total = {}
                for amt, cat in self.expenses:
                    cat_total[cat] = cat_total.get(cat, 0) + amt
                breakdown = "\n".join([f"{k}: {v:.2f}" for k, v in cat_total.items()])
                self.total_label.text = f"Total: {total:.2f}"
                self.dashboard.text = f"Breakdown:\n{breakdown}"

        if __name__ == "__main__":
            ExpenseApp().run()
        PYEOF

    - name: Write buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
[app]
title = Jegan Tracker
package.name = jegantracker
package.domain = org.test
source.dir = .
source.include_exts = py,png,jpg,kv,atlas
version = 1.0
requirements = python3,kivy
orientation = portrait
fullscreen = 0
android.permissions = INTERNET
android.api = 33
android.minapi = 21
android.ndk = 25b
android.sdk = 33
android.private_storage = True
android.accept_sdk_license = True
android.arch = arm64-v8a
p4a.branch = master

[buildozer]
log_level = 2
warn_on_root = 1
EOF

    - name: Accept Android SDK licenses
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        yes | ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager \
          --licenses 2>/dev/null || true

    - name: Build APK
      run: buildozer android debug 2>&1 | tee build.log

    - name: Find APK (search entire workspace)
      run: |
        echo "=== Searching for APK files ==="
        find $HOME $GITHUB_WORKSPACE -name "*.apk" 2>/dev/null || true
        echo "=== Done searching ==="

    - name: Collect APK into output folder
      run: |
        mkdir -p apk-output
        # Search home dir and workspace thoroughly
        find $HOME $GITHUB_WORKSPACE -name "*.apk" 2>/dev/null \
          -exec cp {} apk-output/ \; || true
        echo "=== Contents of apk-output ==="
        ls -lh apk-output/ || echo "EMPTY - no APK found"

    - name: Upload APK
      uses: actions/upload-artifact@v4.6.2
      with:
        name: jegan-tracker-apk
        path: apk-output/
        if-no-files-found: warn

    - name: Upload full build log
      if: always()
      uses: actions/upload-artifact@v4.6.2
      with:
        name: build-log
        path: build.log

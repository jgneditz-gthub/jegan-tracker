name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y python3-pip git zip unzip openjdk-17-jdk
        pip install --upgrade pip
        pip install buildozer cython kivy

    - name: Initialize buildozer
      run: |
        buildozer init || true

    - name: Modify spec
      run: |
        sed -i 's/title = .*/title = Jegan Tracker/' buildozer.spec
        sed -i 's/package.name = .*/package.name = expensetracker/' buildozer.spec
        sed -i 's/package.domain = .*/package.domain = org.test/' buildozer.spec
        sed -i 's/requirements = .*/requirements = python3,kivy/' buildozer.spec

    - name: Build APK
      run: |
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: jegan-tracker-apk
        path: bin/*.apk

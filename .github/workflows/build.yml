name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4.2.2

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "17"

    - name: Set up Python 3.10
      uses: actions/setup-python@v5.4.0
      with:
        python-version: "3.10"

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip \
          libffi-dev libssl-dev \
          build-essential \
          libsqlite3-dev \
          zlib1g-dev \
          libncurses5 \
          autoconf automake libtool \
          pkg-config cmake

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install cython==0.29.36
        pip install buildozer

    - name: Cache buildozer global directory
      uses: actions/cache@v4.2.3
      with:
        path: ~/.buildozer
        key: buildozer-${{ runner.os }}-v3
        restore-keys: buildozer-${{ runner.os }}-

    - name: Cache Android SDK/NDK
      uses: actions/cache@v4.2.3
      with:
        path: ~/.android
        key: android-sdk-${{ runner.os }}-v3
        restore-keys: android-sdk-${{ runner.os }}-

    - name: Rename app file to main.py if needed
      run: |
        if [ ! -f main.py ]; then
          PY_FILE=$(find . -maxdepth 1 -name "*.py" | head -n 1)
          if [ -n "$PY_FILE" ]; then
            cp "$PY_FILE" main.py
            echo "Renamed $PY_FILE to main.py"
          else
            echo "ERROR: No .py file found in repo root"
            exit 1
          fi
        fi

    - name: Write buildozer.spec
      run: |
        cat > buildozer.spec << 'SPECEOF'
[app]
title = Jegan Tracker
package.name = jegantracker
package.domain = org.test
source.dir = .
source.include_exts = py,png,jpg,kv,atlas
version = 1.0
requirements = python3,kivy
orientation = portrait
fullscreen = 0
android.permissions = INTERNET
android.api = 33
android.minapi = 21
android.ndk = 25b
android.archs = arm64-v8a
android.private_storage = True
android.accept_sdk_license = True
p4a.branch = master

[buildozer]
log_level = 2
warn_on_root = 1
SPECEOF

    - name: Accept Android SDK licenses
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        yes | ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager \
          --licenses 2>/dev/null || true

    - name: Build APK
      run: buildozer android debug 2>&1 | tee build.log
      env:
        JAVA_HOME: ${{ env.JAVA_HOME }}

    - name: Find and collect APK
      run: |
        mkdir -p apk-output
        find $HOME $GITHUB_WORKSPACE -name "*.apk" 2>/dev/null \
          -exec cp {} apk-output/ \; || true
        echo "=== APK files found ==="
        ls -lh apk-output/ || echo "No APK found"

    - name: Upload APK
      uses: actions/upload-artifact@v4.6.2
      with:
        name: jegan-tracker-apk
        path: apk-output/
        if-no-files-found: warn

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4.6.2
      with:
        name: build-log
        path: build.log
